name              = "cms-books"
main              = "index.js"
compatibility_date = "2025-01-01"

[vars]
SITE_URL    = "https://anand-raj.github.io"
ADMIN_EMAIL = "e.anandraj@hotmail.com"
FROM_EMAIL  = "onboarding@resend.dev"
MOCK_PAYMENTS = "false"

# Secrets (set via Cloudflare dashboard — never put in this file):
#   RESEND_API_KEY
#   RAZORPAY_KEY_ID
#   RAZORPAY_KEY_SECRET

# Uses the same D1 database as the membership worker
# database_id is from: npx wrangler d1 create cms-membership (already done)

[[d1_databases]]
binding       = "DB"
database_name = "cms-membership"
database_id   = "75e063b5-f7a9-41b2-be46-2a2702c9eef1"
