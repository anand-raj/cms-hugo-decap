name              = "cms-membership"
main              = "index.js"
compatibility_date = "2025-01-01"

[vars]
SITE_URL             = "https://anand-raj.github.io"
WORKER_URL           = "https://cms-membership.e-anandraj.workers.dev"
ADMIN_EMAIL          = "e.anandraj@hotmail.com"
FROM_EMAIL           = "onboarding@resend.dev"
GITHUB_REPO          = "anand-raj/cms-hugo-decap"
MAX_NEWSLETTER_RECIPIENTS = "500"

# Secrets (set via Cloudflare dashboard — never put in this file):
#   RESEND_API_KEY
#   NEWSLETTER_SECRET

# After creating the D1 database with:
#   npx wrangler d1 create cms-membership
# paste the database_id output below, then run:
#   npx wrangler d1 execute cms-membership --file=schema.sql --remote

[[d1_databases]]
binding       = "DB"
database_name = "cms-membership"
database_id   = "75e063b5-f7a9-41b2-be46-2a2702c9eef1"
