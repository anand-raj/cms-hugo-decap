{{ define "main" }}
{{ $workerUrl := site.Params.booksWorkerUrl }}
<div class="content-wrap">
  <h1 class="section-label">Books</h1>
  {{ with .Description }}<p class="books-intro">{{ . }}</p>{{ end }}

  <div class="books-grid" id="books-grid">
    <p id="books-loading">Loading books…</p>
  </div>
</div>

<script>
(function () {
  const WORKER   = '{{ $workerUrl | safeJS }}';
  const BASE_URL = '{{ site.Home.RelPermalink | safeJS }}';
  const grid     = document.getElementById('books-grid');

  fetch(WORKER + '/books')
    .then(function (r) { return r.json(); })
    .then(function (books) {
      if (!books.length) {
        grid.innerHTML = '<p>No books available yet.</p>';
        return;
      }
      grid.innerHTML = books.map(function (b) {
        const priceINR = '₹' + (b.price_paise / 100).toLocaleString('en-IN');
        const stockBadge = b.in_stock
          ? '<span class="book-stock book-stock--in">In Stock</span>'
          : '<span class="book-stock book-stock--out">Out of Stock</span>';
        const buyBtn = b.in_stock
          ? '<a class="btn-buy btn-buy--small" href="' + BASE_URL + 'books/' + b.slug + '/">Buy</a>'
          : '';
        return '<article class="book-card">' +
          '<div class="book-card-body">' +
            '<h2 class="book-card-title"><a href="' + BASE_URL + 'books/' + b.slug + '/">' + b.title + '</a></h2>' +
            '<div class="book-card-footer">' +
              '<span class="book-card-price">' + priceINR + '</span>' +
              stockBadge +
              buyBtn +
            '</div>' +
          '</div>' +
        '</article>';
      }).join('');
    })
    .catch(function () {
      grid.innerHTML = '<p>Could not load books. Please try again later.</p>';
    });
})();
</script>
{{ end }}
