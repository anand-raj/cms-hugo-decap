{{ $workerUrl := site.Params.membershipWorkerUrl }}
<section class="membership-form-section">
  <form id="membership-form" class="membership-form" novalidate>

    <div class="form-group">
      <label for="mem-name">Full name</label>
      <input id="mem-name" name="name" type="text" required
             autocomplete="name" placeholder="Jane Smith">
    </div>

    <div class="form-group">
      <label for="mem-email">Email address</label>
      <input id="mem-email" name="email" type="email" required
             autocomplete="email" placeholder="jane@example.com">
    </div>

    {{/* Honeypot — invisible to humans, bots fill it in */}}
    <input name="website" type="text" tabindex="-1" autocomplete="off"
           style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0">

    <button type="submit" class="btn-membership-submit">Request Membership</button>

    <p class="form-status" role="status" aria-live="polite"></p>
  </form>
</section>

<script>
(function () {
  const form   = document.getElementById('membership-form');
  const status = form.querySelector('.form-status');
  const btn    = form.querySelector('.btn-membership-submit');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    btn.disabled    = true;
    btn.textContent = 'Sending…';
    status.textContent = '';
    status.className   = 'form-status';

    const payload = {
      name:    form.querySelector('[name="name"]').value.trim(),
      email:   form.querySelector('[name="email"]').value.trim(),
      website: form.querySelector('[name="website"]').value,
    };

    try {
      const res  = await fetch('{{ $workerUrl }}/subscribe', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });
      const data = await res.json();

      if (res.ok && data.ok) {
        form.reset();
        btn.style.display  = 'none';
        status.textContent = 'Request received! We will review it and get back to you shortly.';
        status.classList.add('form-status--success');
      } else {
        status.textContent = data.error || 'Something went wrong. Please try again.';
        status.classList.add('form-status--error');
        btn.disabled    = false;
        btn.textContent = 'Request Membership';
      }
    } catch {
      status.textContent = 'Network error. Please check your connection and try again.';
      status.classList.add('form-status--error');
      btn.disabled    = false;
      btn.textContent = 'Request Membership';
    }
  });
})();
</script>
