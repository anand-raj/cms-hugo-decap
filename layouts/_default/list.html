{{ define "main" }}
  <section class="list">
    <h1>{{ .Title }}</h1>
    {{ range .Pages }}
    <article class="list-item">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      {{ with .Summary }}<p>{{ . }}</p>{{ end }}
    </article>
    {{ else }}
    <p>No posts yet.</p>
    {{ end }}
  </section>
{{ end }}
